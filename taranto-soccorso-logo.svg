<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <!-- Blue Star of Life -->
  <g transform="translate(250, 150) scale(1.3)">
    <!-- Main blue asterisk -->
    <path d="M-20,-100 L20,-100 L20,-35 L80,-70 L100,-35 L40,0 L100,35 L80,70 L20,35 L20,100 L-20,100 L-20,35 L-80,70 L-100,35 L-40,0 L-100,-35 L-80,-70 L-20,-35 Z" fill="#292675" stroke="#ffffff" stroke-width="4"/>
    <!-- Caduceus Wings (Red) -->
    <path d="M-5,-45 Q-40,-60 -50,-30 Q-20,-20 -5,-30 M5,-45 Q40,-60 50,-30 Q20,-20 5,-30" fill="none" stroke="#d11328" stroke-width="6"/>
    <!-- Caduceus Staff and Snake -->
    <path d="M0,-65 L0,50" stroke="#292675" stroke-width="6"/>
    <path d="M-15,-10 Q15,0 -15,20 Q15,30 0,40" fill="none" stroke="#292675" stroke-width="6"/>
  </g>
  
  <!-- 118 Text -->
  <text x="390" y="240" font-family="'Arial Black', Impact, sans-serif" font-size="280" font-weight="900" fill="#cc141c" letter-spacing="-15">118</text>
  
  <!-- Red top border -->
  <rect x="130" y="260" width="670" height="6" fill="#cc141c" />
  
  <!-- Blue Banners for TARANTO SOCCORSO -->
  <rect x="130" y="275" width="230" height="55" fill="#292675" />
  <text x="145" y="315" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="3">TARANTO</text>
  
  <rect x="520" y="275" width="280" height="55" fill="#292675" />
  <text x="545" y="315" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="3">SOCCORSO</text>
  
  <!-- Heartbeat line (Red) -->
  <path d="M110,290 L330,290 L360,200 L410,340 L440,290 L480,290 M480,290 L520,290" fill="none" stroke="#cc141c" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Arch/bridge below heartbeat -->
  <path d="M410,330 A 40 40 0 0 1 490 330" fill="none" stroke="#292675" stroke-width="25"/>
</svg>
